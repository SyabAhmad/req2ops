services:
  - type: web
    name: req2ops-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://req2ops.vercel.app,http://localhost:5173
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: PYTHON_VERSION
        value: 3.12.8
